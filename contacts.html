<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Московское метро - Контакты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🚇 Московское метро</h1>
    <nav>
        <a href="index.html">Главная</a>
        <a href="gallery.html">Галерея</a>
        <a href="contacts.html" class="active">Контакты</a>
    </nav>
</header>

<main>
    <section>
        <h2>Контакты</h2>
        <div style="display: flex; gap: 35px; flex-wrap: wrap;">
            <div style="flex:1; min-width:250px; background:#e8f0fe; border-radius:15px; padding:25px;">
                <h3>Иван Петров</h3>
                <p>Гид-экскурсовод по московскому метро</p>
                <p>📧 metro@example.com</p>
                <p>📱 +7 (999) 123-45-67</p>
                <p>📍 Встречи у метро "Арбатская"</p>
                <p>🕒 Пн-Пт: 10:00 - 19:00</p>
            </div>
            <div style="flex:1; min-width:250px; background:#f8f9fa; border-radius:15px; padding:25px;">
                <h3>Задать вопрос</h3>
                <form>
                    <input type="text" placeholder="Ваше имя" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:8px;">
                    <input type="email" placeholder="Ваш Email" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:8px;">
                    <select style="width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:8px;">
                        <option>Экскурсия</option>
                        <option>Вопрос о метро</option>
                        <option>Сотрудничество</option>
                    </select>
                    <textarea rows="4" placeholder="Ваше сообщение" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:8px;"></textarea>
                    <button style="background:#0b2b40; color:white; border:none; padding:12px; border-radius:30px; width:100%; cursor:pointer;">Отправить</button>
                </form>
            </div>
        </div>
    </section>
</main>

<footer>
    <p>© 2025 Московское метро</p>
</footer>

</body>
</html>
